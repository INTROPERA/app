<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INTROPERA - Streaming Indie</title>
    <style>
        :root {
            --bg-color: #050505;
            --neon-turquoise: #00f2ff;
            --neon-glow: 0 0 10px rgba(0, 242, 255, 0.7), 0 0 20px rgba(0, 242, 255, 0.4);
            --white-glow: 0 0 15px rgba(255, 255, 255, 0.3);
            --text-color: #ffffff;
            --transition-speed: 0.5s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        html {
            font-size: 16px; /* Base para rem */
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        body {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background: radial-gradient(circle at 50% 50%, #0a0a0a 0%, #050505 100%);
            background-attachment: fixed;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: -1;
        }

        /* Utilidades */
        .hidden { display: none !important; }
        .flex-center { display: flex; justify-content: center; align-items: center; }

        /* --- Pantalla de Selección de Perfil --- */
        #profile-selection {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            text-align: center;
        }

        .menu-card {
            background: rgba(15, 15, 15, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 3.5rem 2.5rem;
            border-radius: 2rem;
            width: 100%;
            backdrop-filter: blur(25px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            border-top: 1px solid var(--neon-turquoise);
            margin-top: 1rem;
            animation: fadeIn 0.8s ease-out;
        }

        h1.logo {
            font-size: 5rem;
            letter-spacing: 2.5rem;
            width: 100%;
            text-align: left;
            color: #ffffff;
            text-shadow: var(--white-glow);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            margin-left: -5rem; /* Lo desplaza un poco más hacia la izquierda */
        }

        .divider {
            width: 100%;
            max-width: 500px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ffffff, transparent);
            margin: 1rem auto 2rem;
            opacity: 0.5;
        }

        .profile-add-circle {
            width: 8rem;
            height: 8rem;
            border: 2px dashed var(--neon-turquoise);
            border-radius: 50%;
            margin: 0 auto 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 3rem;
            color: var(--neon-turquoise);
            animation: float 3s ease-in-out infinite;
        }

        .profile-add-circle:hover {
            background: rgba(0, 242, 255, 0.1);
            box-shadow: var(--neon-glow);
            transform: scale(1.05);
        }

        /* --- Formulario de Creación --- */
        #profile-form {
            width: 100%;
            animation: fadeIn 0.5s ease forwards;
        }

        .avatar-scroll {
            display: flex;
            overflow-x: auto;
            gap: 1.5rem;
            padding: 1rem 0.5rem;
            margin: 1.5rem 0;
            scrollbar-width: thin;
            scrollbar-color: var(--neon-turquoise) transparent;
        }

        .avatar-scroll::-webkit-scrollbar { height: 4px; }
        .avatar-scroll::-webkit-scrollbar-thumb { background: var(--neon-turquoise); border-radius: 10px; }

        .avatar-option:hover {
            transform: scale(1.1);
            border-color: rgba(0, 242, 255, 0.5);
        }

        .avatar-option {
            min-width: 4.5rem;
            height: 4.5rem;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: border 0.3s;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .avatar-option.selected {
            border-color: var(--neon-turquoise);
            box-shadow: var(--neon-glow);
        }

        .avatar-option svg { width: 70%; height: 70%; fill: var(--neon-turquoise); opacity: 0.8; }

        input[type="text"] {
            width: 100%;
            padding: 1rem;
            background: #111;
            border: 1px solid #333;
            color: white;
            border-radius: 0.8rem;
            margin-bottom: 2rem;
            font-size: 20px; /* Tamaño mayor para mejor legibilidad y evitar zoom en iOS */
            outline: none;
            height: 70px; /* Aumentado para acomodar el texto de 20px */
            padding: 0 1.5rem;
        }

        input[type="text"]:focus {
            border-color: var(--neon-turquoise);
        }

        .btn-start {
            background: var(--neon-turquoise);
            color: #000;
            border: 1px solid var(--neon-turquoise);
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: var(--neon-glow);
        }

        .btn-start:hover {
            background: transparent;
            color: var(--neon-turquoise);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.8);
            transform: translateY(-2px);
        }

        /* --- Pantalla de Carga (Transición) --- */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            flex-direction: column;
            align-items: center;
        }

        #intro-video {
            width: 90%;
            max-width: 800px;
            margin-bottom: 2rem;
        }

        .progress-container {
            width: 80%;
            max-width: 400px;
            height: 2px;
            background: #222;
            margin-top: 2rem;
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--neon-turquoise);
            box-shadow: var(--neon-glow);
            animation: load 2.5s ease-in-out forwards;
        }

        .status-text {
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: var(--neon-turquoise);
            margin-top: 1rem;
            text-transform: uppercase;
            opacity: 0.7;
        }

        /* --- Plataforma Principal --- */
        #main-app {
            width: 100%;
            padding: 2rem;
            text-align: center;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--neon-turquoise);
            text-shadow: var(--neon-glow);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 0;
            margin-bottom: 3rem;
        }

        .welcome-msg { margin-top: 2rem; color: var(--neon-turquoise); }

        /* Animaciones */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Responsivo */
        @media (max-width: 600px) {
            #profile-selection { padding: 0.5rem; max-width: 100%; }
            h1.logo { font-size: 3.5rem; letter-spacing: 0.8rem; text-align: center; margin-left: 0; margin-top: 2rem; }
            .divider { margin-bottom: 1.5rem; }
            .subtitle { font-size: 0.8rem; letter-spacing: 2px; }
            .btn-start { width: 100%; height: 65px; font-size: 1rem; }
            .menu-card { 
                padding: 2.5rem 1.5rem; 
                border-radius: 1.5rem; 
                margin-top: 0;
            }
            .profile-add-circle { width: 10rem; height: 10rem; font-size: 4rem; }
        }
    </style>
</head>
<body>

    <!-- PANTALLA 1: SELECCIÓN / CREACIÓN -->
    <section id="profile-selection">
        <h1 class="logo">INTROPERA</h1>
        <div class="divider"></div>
        <p class="subtitle">plataforma de streaming de series indie</p>
        
        <div id="initial-view">
            <div class="profile-add-circle flex-center" onclick="showForm()">+</div>
            <p>Añadir Perfil</p>
        </div>

        <div id="profile-form" class="hidden menu-card">
            <p>Escoge tu avatar</p>
            <div class="avatar-scroll" id="avatar-list">
                <!-- Se generan vía JS -->
            </div>
            
            <input type="text" id="username" placeholder="Tu nombre..." maxlength="15">
            
            <button class="btn-start" onclick="startExperience()">Comenzar Experiencia</button>
        </div>
    </section>

    <!-- PANTALLA 2: TRANSICIÓN -->
    <section id="loading-screen" class="hidden flex-center">
        <video id="intro-video" src="intro.mp4" muted playsinline></video>
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        <div class="status-text">Iniciando Sistema...</div>
    </section>

    <!-- PANTALLA 3: DASHBOARD -->
    <main id="main-app" class="hidden">
        <h1 class="logo">INTROPERA</h1>
        <div class="divider"></div>
        <p class="subtitle">plataforma de streaming de series indie</p>
        
        <div class="welcome-msg" id="welcome-user"></div>
        
        <!-- Aquí iría el contenido de las series -->
        <div style="margin-top: 5rem; border: 1px solid #222; padding: 4rem; color: #444;">
            [ Catálogo Indie en construcción ]
        </div>
    </main>

    <script>
        const avatars = [
            '<path d="M50 10 L90 90 L10 90 Z M50 30 L75 80 L25 80 Z" fill-rule="evenodd"/>',
            '<circle cx="50" cy="50" r="40" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="15 10"/><circle cx="50" cy="50" r="20"/>',
            '<rect x="20" y="20" width="60" height="60" fill="none" stroke="currentColor" stroke-width="2" transform="rotate(45 50 50)"/><rect x="35" y="35" width="30" height="30"/>',
            '<path d="M10 50 Q 50 10 90 50 T 10 50" fill="none" stroke="currentColor" stroke-width="4"/><circle cx="50" cy="50" r="8"/>',
            '<path d="M50 15 L85 35 V65 L50 85 L15 65 V35 Z" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="50" cy="50" r="10"/>',
            '<circle cx="35" cy="40" r="15" opacity="0.6"/><circle cx="65" cy="40" r="15" opacity="0.6"/><circle cx="50" cy="70" r="15" opacity="0.6"/>',
            '<path d="M20 20 L80 80 M80 20 L20 80" stroke="currentColor" stroke-width="4"/><circle cx="50" cy="50" r="35" fill="none" stroke="currentColor" stroke-width="2"/>',
            '<path d="M50 5 L95 50 L50 95 L5 50 Z" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="50" cy="50" r="15"/>',
            '<path d="M50 20 A 30 30 0 1 1 50 80 A 30 30 0 1 1 50 20" fill="none" stroke="currentColor" stroke-width="8" stroke-dasharray="12 6"/>',
            '<polygon points="50,10 60,40 90,40 65,60 75,90 50,70 25,90 35,60 10,40 40,40" fill="none" stroke="currentColor" stroke-width="2"/>'
        ];

        let selectedAvatarIndex = 0;

        // Renderizar lista de avatars
        const avatarList = document.getElementById('avatar-list');
        avatars.forEach((svgInner, index) => {
            const div = document.createElement('div');
            div.className = `avatar-option ${index === 0 ? 'selected' : ''}`;
            div.innerHTML = `<svg viewBox="0 0 100 100">${svgInner}</svg>`;
            div.onclick = () => {
                document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
                selectedAvatarIndex = index;
            };
            avatarList.appendChild(div);
        });

        function showForm() {
            document.getElementById('initial-view').classList.add('hidden');
            document.getElementById('profile-form').classList.remove('hidden');
        }

        function startExperience() {
            const name = document.getElementById('username').value.trim();
            if(!name) {
                alert("Por favor, ingresa un nombre para tu perfil.");
                return;
            }

            // Guardar en LocalStorage
            const profile = {
                name: name,
                avatar: selectedAvatarIndex
            };
            localStorage.setItem('intropera_profile', JSON.stringify(profile));

            // Iniciar Transición
            document.getElementById('profile-selection').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');

            // Reproducir video de introducción
            const video = document.getElementById('intro-video');
            if (video) video.play();

            // Simular carga y mostrar app principal
            setTimeout(() => {
                showMainApp(profile);
            }, 3000); // 3 segundos de "video/carga"
        }

        function showMainApp(profile) {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('welcome-user').innerText = `Bienvenido de vuelta, ${profile.name}`;
        }

        // Comprobar si ya existe perfil al cargar
        window.onload = () => {
            const savedProfile = localStorage.getItem('intropera_profile');
            if(savedProfile) {
                const profile = JSON.parse(savedProfile);
                // Si ya existe, podríamos saltar directo o mostrar el avatar. 
                // Para este ejercicio, permitiremos crear uno nuevo o detectar el existente:
                console.log("Perfil detectado:", profile.name);
            }
        };
    </script>
</body>
</html>
